services:
  chatwarp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatwarp-api:local
    container_name: chatwarp-api
    restart: unless-stopped
    environment:
      PORT: 8080
      # Using SQLite as per main.rs setup
      DATABASE_PATH: /app/data/whatsapp.db
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - chatwarp-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - chatwarp-net

volumes:
  chatwarp-data:

networks:
  chatwarp-net:
    name: chatwarp-net
