services:
  chatwarp-api:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache
      cache_to:
        - type=local,dest=/tmp/docker-cache,mode=max
    image: chatwarp-api:local
    container_name: chatwarp-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      # Provide DATABASE_URL for Postgres (e.g. Supabase)
      # DATABASE_URL: postgres://postgres.your-project:password@aws-0-pooler.supabase.com:5432/postgres
      # Default fallback to SQLite if DATABASE_URL is not set or not starting with postgres://
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - chatwarp-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - chatwarp-net
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - chatwarp-net

volumes:
  chatwarp-data:
  n8n-data:

networks:
  chatwarp-net:
    name: chatwarp-net
