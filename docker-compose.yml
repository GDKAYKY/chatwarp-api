services:
  chatwarp-api:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=/tmp/docker-cache
      cache_to:
        - type=local,dest=/tmp/docker-cache,mode=max
    image: chatwarp-api:local
    container_name: chatwarp-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      RUST_LOG: info
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8080:8080"
    volumes:
      - chatwarp-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s


volumes:
  chatwarp-data: