$kind: http-request
name: POST /{session}/presence/{chatId}/subscribe
url: "{{base_url}}/:session/presence/:chatId/subscribe"
method: POST
scripts:
  - type: afterResponse
    code: pm.test('status is not 500', function () {
      pm.response.to.not.have.status(500); });
    language: text/javascript
order: 4000
