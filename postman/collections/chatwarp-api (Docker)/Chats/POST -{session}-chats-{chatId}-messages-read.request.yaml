$kind: http-request
name: POST /{session}/chats/{chatId}/messages/read
url: "{{base_url}}/:session/chats/:chatId/messages/read"
method: POST
scripts:
  - type: afterResponse
    code: pm.test('status is not 500', function () {
      pm.response.to.not.have.status(500); });
    language: text/javascript
order: 8000
