$kind: http-request
name: GET /{session}/chats/{chatId}/picture
url: "{{base_url}}/:session/chats/:chatId/picture"
method: GET
scripts:
  - type: afterResponse
    code: pm.test('status is not 500', function () {
      pm.response.to.not.have.status(500); });
    language: text/javascript
order: 5000
