$kind: http-request
name: POST /sendText
url: "{{base_url}}/sendText"
method: POST
payload:
  $kind: json
  raw: |-
    {
      "chatId": "{{to_jid}}",
      "text": "{{message_text}}",
      "session": "{{instance_name}}"
    }
body:
  type: json
  content: "{\r

    \  \"chatId\": \"{{to_jid}}\",\r

    \  \"text\": \"{{message_text}}\",\r

    \  \"session\": \"{{instance_name}}\"\r

    }\r\n"
scripts:
  - type: afterResponse
    code: pm.test('status is not 500', function () {
      pm.response.to.not.have.status(500); });
    language: text/javascript
order: 1000
