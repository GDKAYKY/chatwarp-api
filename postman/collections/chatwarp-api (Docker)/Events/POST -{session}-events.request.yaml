$kind: http-request
name: POST /{session}/events
url: "{{base_url}}/:session/events"
method: POST
payload:
  $kind: json
  raw: "{}"
scripts:
  - type: afterResponse
    code: pm.test('status is not 500', function () {
      pm.response.to.not.have.status(500); });
    language: text/javascript
order: 1000
